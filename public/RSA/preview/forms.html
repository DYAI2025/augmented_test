<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:24px;background:#fff;font-family:var(--ao-font-ui);color:var(--ao-ink)}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.f{border:1px solid var(--ao-slate-200);padding:12px;border-radius:10px}label{display:block;font-family:var(--ao-font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ao-slate-500);margin-bottom:6px}input,select{width:100%;box-sizing:border-box;padding:10px 12px;border:1px solid var(--ao-slate-200);border-radius:8px;font-family:var(--ao-font-ui);font-size:14px;color:var(--ao-ink);background:#fff}input:focus{outline:none;border-color:#1A237E;box-shadow:0 0 0 3px rgba(26,35,126,.15)}.err input{border-color:#E11D48;background:#FFF1F2}.hint{font-family:var(--ao-font-mono);font-size:10px;color:var(--ao-slate-500);margin-top:6px}.err .hint{color:#E11D48}</style></head><body><div class="grid"><div class="f"><label>Default</label><input placeholder="name@firma.de"></div><div class="f"><label>Focus</label><input value="AUGMENTED_OPS" style="border-color:#1A237E;box-shadow:0 0 0 3px rgba(26,35,126,.15)"></div><div class="f err"><label>Error</label><input value="invalid@"><div class="hint">Bitte geben Sie eine gültige E-Mail-Adresse an.</div></div><div class="f"><label>Select</label><select><option>Service auswählen</option></select></div></div></body></html>
