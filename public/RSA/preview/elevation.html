<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:28px;background:var(--ao-slate-50);font-family:var(--ao-font-ui);color:var(--ao-ink)}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}.t{background:#fff;padding:18px;text-align:center;font-family:var(--ao-font-mono);font-size:11px;color:var(--ao-slate-500)}.t strong{display:block;color:var(--ao-ink);font-size:13px;margin-bottom:8px}.s1{box-shadow:0 1px 2px rgba(11,20,55,.06)}.s2{box-shadow:0 4px 12px -2px rgba(11,20,55,.08)}.s3{box-shadow:0 20px 40px -20px rgba(11,20,55,.18)}.s4{box-shadow:0 30px 60px -20px rgba(11,20,55,.25)}.r1{border-radius:2px}.r2{border-radius:8px}.r3{border-radius:14px}.r4{border-radius:9999px;padding:10px 20px}</style></head><body><div class="grid" style="margin-bottom:20px"><div class="t s1"><strong>sm</strong>0 1 2 / .06</div><div class="t s2"><strong>md</strong>0 4 12 -2 / .08</div><div class="t s3"><strong>lg</strong>0 20 40 -20 / .18</div><div class="t s4"><strong>xl</strong>0 30 60 -20 / .25</div></div><div class="grid"><div class="t r1 s1"><strong>2px</strong>ops / neon</div><div class="t r2 s1"><strong>8px</strong>inputs · chips</div><div class="t r3 s1"><strong>14px</strong>cards</div><div class="t r4 s1"><strong>9999px</strong>pills · CTAs</div></div></body></html>
