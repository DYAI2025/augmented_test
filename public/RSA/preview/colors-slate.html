<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:24px;background:#fff;font-family:var(--ao-font-ui);color:var(--ao-ink)}.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}.sw{border-radius:10px;overflow:hidden;border:1px solid var(--ao-slate-200)}.sw .clr{height:60px}.sw .meta{padding:6px 8px;font-family:var(--ao-font-mono);font-size:10px;line-height:1.4}.sw .name{color:var(--ao-ink);font-weight:600}.sw .hex{color:var(--ao-slate-500)}</style></head><body><div class="grid"><div class="sw"><div class="clr" style="background:#0F172A"></div><div class="meta"><div class="name">Ink</div><div class="hex">#0F172A</div></div></div><div class="sw"><div class="clr" style="background:#334155"></div><div class="meta"><div class="name">700</div><div class="hex">#334155</div></div></div><div class="sw"><div class="clr" style="background:#64748B"></div><div class="meta"><div class="name">500</div><div class="hex">#64748B</div></div></div><div class="sw"><div class="clr" style="background:#94A3B8"></div><div class="meta"><div class="name">400</div><div class="hex">#94A3B8</div></div></div><div class="sw"><div class="clr" style="background:#E2E8F0"></div><div class="meta"><div class="name">200</div><div class="hex">#E2E8F0</div></div></div><div class="sw"><div class="clr" style="background:#F1F5F9"></div><div class="meta"><div class="name">100</div><div class="hex">#F1F5F9</div></div></div><div class="sw"><div class="clr" style="background:#F8FAFC"></div><div class="meta"><div class="name">50</div><div class="hex">#F8FAFC</div></div></div></div><p style="margin:14px 0 0;font-family:var(--ao-font-mono);font-size:11px;color:var(--ao-slate-500)">Tailwind slate scale, used verbatim. Ink = body copy · 700 = secondary · 500 = muted · 200 = default border · 50 = alt section bg.</p></body></html>
