<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:24px;background:#000;font-family:var(--ao-font-ui);color:#fff}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.sw{border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.1)}.sw .clr{height:70px}.sw .meta{padding:8px 10px;font-family:var(--ao-font-mono);font-size:10px;line-height:1.4;background:#0D0D0D}.sw .name{color:#fff;font-weight:600;letter-spacing:.04em;text-transform:uppercase}.sw .hex{color:rgba(255,255,255,.5)}</style></head><body><div class="grid"><div class="sw"><div class="clr" style="background:#000"></div><div class="meta"><div class="name">Black</div><div class="hex">#000000</div></div></div><div class="sw"><div class="clr" style="background:#0D0D0D"></div><div class="meta"><div class="name">Dark Card</div><div class="hex">#0D0D0D</div></div></div><div class="sw"><div class="clr" style="background:#00F0FF;box-shadow:inset 0 0 20px rgba(0,240,255,.5)"></div><div class="meta"><div class="name">Neon Blue</div><div class="hex">#00F0FF</div></div></div><div class="sw"><div class="clr" style="background:#39FF14;box-shadow:inset 0 0 20px rgba(57,255,20,.5)"></div><div class="meta"><div class="name">Neon Green</div><div class="hex">#39FF14</div></div></div></div><p style="margin:14px 0 0;font-family:var(--ao-font-mono);font-size:11px;color:rgba(255,255,255,.5);letter-spacing:.05em">Secondary "ops" variant — dashboards &amp; investor hero moments only. Never mixed with navy in the same frame.</p></body></html>
