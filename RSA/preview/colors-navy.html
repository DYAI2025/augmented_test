<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:24px;background:#fff;font-family:var(--ao-font-ui);color:var(--ao-ink)}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}.sw{border-radius:10px;overflow:hidden;border:1px solid var(--ao-slate-200)}.sw .clr{height:70px}.sw .meta{padding:8px 10px;font-family:var(--ao-font-mono);font-size:10px;line-height:1.4}.sw .name{color:var(--ao-ink);font-weight:600;letter-spacing:.04em;text-transform:uppercase}.sw .hex{color:var(--ao-slate-500)}</style></head><body><div class="grid"><div class="sw"><div class="clr" style="background:#0B1437"></div><div class="meta"><div class="name">Navy 900</div><div class="hex">#0B1437</div></div></div><div class="sw"><div class="clr" style="background:#13205C"></div><div class="meta"><div class="name">Navy 800</div><div class="hex">#13205C</div></div></div><div class="sw"><div class="clr" style="background:#1A237E"></div><div class="meta"><div class="name">Navy 700 ★</div><div class="hex">#1A237E</div></div></div><div class="sw"><div class="clr" style="background:#3949AB"></div><div class="meta"><div class="name">Navy 600</div><div class="hex">#3949AB</div></div></div><div class="sw"><div class="clr" style="background:#5C6BC0"></div><div class="meta"><div class="name">Navy 500</div><div class="hex">#5C6BC0</div></div></div></div><p style="margin:14px 0 0;font-family:var(--ao-font-mono);font-size:11px;color:var(--ao-slate-500);letter-spacing:.05em">★ 700 is the signature brand colour. 900 = strip backgrounds · 800 = CTA hover · 600 = hover borders · 500 = chart support.</p></body></html>
