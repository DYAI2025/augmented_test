<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:24px;background:var(--ao-slate-50);font-family:var(--ao-font-ui);color:var(--ao-ink)}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.c{background:#fff;border:1px solid var(--ao-slate-200);border-radius:14px;padding:18px}.c.elev{box-shadow:0 20px 40px -20px rgba(11,20,55,.15);border-color:transparent}.c.dark{background:#0B1437;color:#fff;border-color:transparent}.eye{font-family:var(--ao-font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ao-slate-500);margin-bottom:10px}.c.dark .eye{color:rgba(255,255,255,.6)}h3{margin:0 0 6px;font-size:18px;font-weight:700;letter-spacing:-.01em}p{margin:0;font-size:13px;color:var(--ao-slate-500);line-height:1.5}.c.dark p{color:rgba(255,255,255,.65)}</style></head><body><div class="grid"><div class="c"><div class="eye">Flat · default</div><h3>Scout</h3><p>Findet Signal im Marktrauschen.</p></div><div class="c elev"><div class="eye">Elevated · featured</div><h3>Narrator</h3><p>Schreibt die Story, keine Floskeln.</p></div><div class="c dark"><div class="eye">Dark · investor hero</div><h3>Quant</h3><p>Modelliert 5-Jahres-P&amp;L in Echtzeit.</p></div></div></body></html>
